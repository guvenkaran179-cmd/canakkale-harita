<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Çanakkale İli — Tarihi Harita</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:430px;
  left:50%;transform:translateX(-50%)}
#sb{height:env(safe-area-inset-top,0px);background:rgba(0,0,0,.4);flex-shrink:0}
#hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 8px;background:rgba(255,255,255,.93);
  backdrop-filter:blur(20px);border-bottom:.5px solid rgba(0,0,0,.12);
  flex-shrink:0;z-index:800}
#hdr h1{font-size:15px;font-weight:700;letter-spacing:.02em;color:#111}
#hdr p{font-size:10px;color:#888;margin-top:1px}
#seg{display:flex;background:rgba(0,0,0,.08);border-radius:8px;padding:2px;gap:2px}
.sg{font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;
  border:none;background:transparent;color:#555;cursor:pointer;transition:all .18s}
.sg.on{background:#fff;color:#111;box-shadow:0 1px 4px rgba(0,0,0,.15)}
#map{flex:1;position:relative;z-index:0}
#map.tm .leaflet-container{cursor:crosshair!important}
#fab{position:absolute;bottom:16px;right:14px;z-index:700;
  background:#1a1a1a;color:#fff;border:none;padding:10px 16px;
  border-radius:24px;font-size:12px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.35);display:flex;align-items:center;gap:7px}
#fab.on{background:#c04428}
#rbar{position:absolute;top:10px;left:10px;right:10px;z-index:700;
  background:rgba(14,14,14,.93);backdrop-filter:blur(16px);
  border-radius:14px;display:none;flex-direction:column;
  box-shadow:0 3px 16px rgba(0,0,0,.4)}
#rbar.on{display:flex}
#rb-row{display:flex;align-items:center;gap:6px;padding:8px 10px}
#rb-steps{flex:1;display:flex;align-items:center;gap:3px;overflow-x:auto;scrollbar-width:none;min-width:0}
#rb-steps::-webkit-scrollbar{display:none}
.rs{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;cursor:pointer}
.rs.sel{outline:2px solid #fff;outline-offset:1px}
.ra{color:rgba(255,255,255,.3);font-size:10px;flex-shrink:0}
#rb-hint{padding:0 10px 8px;font-size:11px;color:rgba(255,255,255,.5);display:none}
#rb-hint.on{display:block}
.rbtn{background:rgba(255,255,255,.12);border:none;color:#fff;
  padding:4px 8px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.rbtn.r{background:rgba(200,60,60,.35);color:#ffa0a0}
.rbtn.r:disabled{opacity:.3;cursor:default}
#rb-x{background:none;border:none;color:rgba(255,255,255,.4);font-size:17px;cursor:pointer;padding:0 2px}
#spin{position:absolute;top:58px;left:50%;transform:translateX(-50%);z-index:700;
  background:rgba(14,14,14,.9);backdrop-filter:blur(10px);color:#fff;
  font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;
  display:none;align-items:center;gap:8px;white-space:nowrap}
#spin.on{display:flex}
.sp{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
#sheet{position:absolute;left:10px;right:10px;bottom:10px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(24px);
  border-radius:18px;padding:14px 16px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.22);border:.5px solid rgba(0,0,0,.08);
  z-index:900;transform:translateY(120%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#sheet.on{transform:translateY(0)}
#sh-h{width:36px;height:4px;background:rgba(0,0,0,.14);border-radius:2px;margin:0 auto 12px}
#sh-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:6px}
#sh-title{font-size:15px;font-weight:700;color:#111;line-height:1.3;margin-bottom:6px}
#sh-desc{font-size:12px;color:#555;line-height:1.6}
#sh-x{position:absolute;top:14px;right:14px;width:26px;height:26px;
  border-radius:50%;background:rgba(0,0,0,.08);border:none;font-size:13px;
  color:#666;cursor:pointer;display:flex;align-items:center;justify-content:center}
#ts{position:absolute;left:0;right:0;bottom:0;
  background:rgba(255,255,255,.98);backdrop-filter:blur(24px);
  border-radius:16px 16px 0 0;
  box-shadow:0 -3px 20px rgba(0,0,0,.14);border-top:.5px solid rgba(0,0,0,.08);
  z-index:950;height:0;overflow:hidden;
  display:flex;flex-direction:column;
  will-change:height;touch-action:none}
#ts-drag{padding:10px 0 4px;cursor:ns-resize;text-align:center;flex-shrink:0;user-select:none}
#ts-drag::after{content:'';display:inline-block;width:40px;height:4px;
  background:rgba(0,0,0,.16);border-radius:2px}
#ts-head{padding:4px 14px 9px;border-bottom:.5px solid rgba(0,0,0,.07);
  display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-shrink:0}
#ts-dist{font-size:20px;font-weight:800;color:#111;letter-spacing:-.02em}
#ts-sub{font-size:10px;color:#aaa;margin-top:1px}
#ts-elev{font-size:10px;color:#666;font-weight:500;margin-top:2px}
#ts-close{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.07);
  border:none;cursor:pointer;font-size:16px;color:#555;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
#vtabs{display:flex;gap:5px;padding:8px 12px 4px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#vtabs::-webkit-scrollbar{display:none}
.vt{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;
  cursor:pointer;border:1.5px solid;white-space:nowrap;flex-shrink:0;color:#fff;transition:all .15s}
.vt:not(.on){opacity:.45;background:transparent!important}
#vcards{padding:7px 12px 10px;display:flex;flex-direction:column;gap:5px;
  flex:1;overflow-y:auto;min-height:0;-webkit-overflow-scrolling:touch}
.vc{border-radius:12px;padding:9px 11px;background:rgba(0,0,0,.03);
  border:1.5px solid transparent;display:flex;align-items:flex-start;gap:9px;
  cursor:pointer;transition:all .15s}
.vi{font-size:20px;flex-shrink:0;margin-top:2px}
.vb{flex:1;min-width:0}
.vt2{display:flex;align-items:baseline;justify-content:space-between;gap:6px}
.vn{font-size:12px;font-weight:700;color:#111}
.ve{font-size:9px;color:#bbb}
.vtime{font-size:14px;font-weight:800;color:#111;white-space:nowrap}
.vnight{font-size:10px;font-weight:600;margin-top:2px}
.vkm{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;
  color:#fff;display:inline-block;margin-top:3px}
.vslope{font-size:10px;color:#666;margin-top:3px;font-weight:500;display:flex;gap:8px;flex-wrap:wrap}
.vsea{font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;
  background:#E3F2FD;color:#0277BD;display:inline-block;margin-top:3px}
/* Multi-modal panel */
#mm-wrap{display:flex;flex-direction:column;flex:1;overflow-y:auto;min-height:0;
  -webkit-overflow-scrolling:touch}
.mm-sec{padding:6px 12px 4px}
.mm-lbl{font-size:10px;font-weight:700;color:#999;text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:5px}
.mm-div{padding:6px 12px;font-size:11px;font-weight:700;color:#fff;
  background:#1a1a1a;display:flex;align-items:center;gap:6px}
.mm-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;
  border-radius:10px;border:1.5px solid #eee;margin-bottom:5px;
  cursor:pointer;transition:all .15s;background:#fff}
.mm-opt.on{border-color:var(--vc);background:color-mix(in srgb,var(--vc) 10%,white)}
.mm-icon{font-size:18px;flex-shrink:0}
.mm-body{flex:1;min-width:0}
.mm-name{font-size:12px;font-weight:700;color:#111}
.mm-era{font-size:9px;color:#bbb}
.mm-right{text-align:right;flex-shrink:0}
.mm-time{font-size:13px;font-weight:800;color:#111}
.mm-km{font-size:10px;color:#aaa;margin-top:1px}
.mm-total{padding:10px 14px;background:#f7f7f7;
  border-top:.5px solid #e0e0e0;font-size:13px;font-weight:700;
  color:#111;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.vq{font-size:11px;color:#888;margin-top:4px;line-height:1.45;font-style:italic}
#tl{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);
  border-top:.5px solid rgba(0,0,0,.1);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));
  flex-shrink:0;z-index:800}
#tl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#tl-y{font-size:18px;font-weight:800;color:#111;letter-spacing:-.02em}
#tl-p{font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px}
#tl-sl{width:100%;height:34px;-webkit-appearance:none;appearance:none;
  background:transparent;outline:none;cursor:pointer;display:block}
#tl-sl::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:#e0e0e0}
#tl-sl::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;
  border-radius:50%;background:#fff;border:none;margin-top:-10.5px;cursor:pointer;
  box-shadow:0 0 1px rgba(0,0,0,.3),0 2px 10px rgba(0,0,0,.25)}
#tl-sl::-moz-range-track{height:5px;border-radius:3px;background:#e0e0e0}
#tl-sl::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#fff;
  border:none;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.pl{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;color:#666;
  padding:3px 8px;border-radius:20px;background:rgba(0,0,0,.05);
  cursor:pointer;border:.5px solid transparent;transition:all .15s}
.pd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leaflet-control-zoom{border:none!important;border-radius:12px!important;overflow:hidden;
  box-shadow:0 2px 12px rgba(0,0,0,.25)!important}
.leaflet-control-zoom a{width:36px!important;height:36px!important;line-height:36px!important;
  font-size:20px!important;background:rgba(255,255,255,.95)!important;color:#333!important}
.leaflet-control-attribution{font-size:9px!important;background:rgba(255,255,255,.55)!important;
  border-radius:8px 0 0!important;padding:2px 6px!important}
.leaflet-attribution-flag{display:none!important}
.trt{background:rgba(30,30,30,.85)!important;border:none!important;color:#fff!important;
  font-size:11px!important;font-weight:600!important;border-radius:8px!important;
  padding:4px 9px!important;white-space:nowrap}
.trt::before{border-top-color:rgba(30,30,30,.85)!important}
#load{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;
  background:rgba(242,240,235,.92);gap:12px}
#load p{font-size:13px;color:#888;font-weight:500}
.ld{width:32px;height:32px;border:3px solid rgba(0,0,0,.1);
  border-top-color:#555;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="sb"></div>
  <div id="hdr">
    <div>
      <h1>🗺 TRAKYA & RUMELİ — TARİHİ HARİTA</h1>
      <p>M.Ö. 3000'den M.S. 1922'ye · Çanakkale'den Belgrad'a</p>
    </div>
    <div id="seg">
      <button class="sg on" id="btn-map"  onclick="setLayer('map')">Harita</button>
      <button class="sg"    id="btn-topo" onclick="setLayer('topo')">Topo</button>
      <button class="sg"    id="btn-sat"  onclick="setLayer('sat')">Uydu</button>
    </div>
  </div>
  <div id="map">
    <div id="load"><div class="ld"></div><p>Harita yükleniyor…</p></div>
    <div id="rbar">
      <div id="rb-row">
        <div id="rb-steps"></div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
          <button class="rbtn r" id="btn-del" onclick="delSel()" disabled>🗑 Sil</button>
          <button id="rb-x" onclick="cancelT()">✕</button>
        </div>
      </div>
      <div id="rb-hint"></div>
    </div>
    <div id="spin"><div class="sp"></div>Güzergah hesaplanıyor…</div>
    <button id="fab" onclick="togT()"><span>🗺</span> Yolculuk Ölç</button>
    <div id="sheet">
      <div id="sh-h"></div>
      <div id="sh-tag">—</div>
      <div id="sh-title">—</div>
      <div id="sh-desc">—</div>
      <button id="sh-x" onclick="closeSheet()">✕</button>
    </div>
    <div id="ts">
      <div id="ts-drag"></div>
      <div id="ts-head">
        <div style="flex:1;min-width:0">
          <div id="ts-dist">— km</div>
          <div id="ts-sub">Topografya bazlı tahmini güzergah</div>
          <div id="ts-elev"></div>
        </div>
        <button id="ts-close" onclick="tsMinimize()" title="Küçült">⌄</button>
      </div>
      <!-- Normal (kara) rota -->
      <div id="vtabs"></div>
      <div id="vcards"></div>
      <!-- Çok modlu rota (deniz geçişi varsa) -->
      <div id="mm-wrap" style="display:none">
        <div class="mm-sec" id="mm-sec1">
          <div class="mm-lbl">📍 Başlangıçtan İskeleye</div>
          <div class="mm-opts" id="mm-opts1"></div>
        </div>
        <div class="mm-div">🌊 Deniz Geçişi</div>
        <div class="mm-sec" id="mm-sec-sea">
          <div class="mm-lbl">⛵ Deniz Araçları</div>
          <div class="mm-opts" id="mm-optssea"></div>
        </div>
        <div class="mm-div">🏁 Karşı Yakada</div>
        <div class="mm-sec" id="mm-sec2">
          <div class="mm-lbl">📍 İskeleden Varışa</div>
          <div class="mm-opts" id="mm-opts2"></div>
        </div>
        <div class="mm-total" id="mm-total"></div>
      </div>
    </div>
  </div>
  <div id="tl">
    <div id="tl-top">
      <span id="tl-y">M.Ö. 3000</span>
      <span id="tl-p">Erken Bronz Çağı</span>
    </div>
    <input type="range" id="tl-sl" min="-3000" max="1922" value="-2800" step="50">
    <div id="pills"></div>
  </div>
</div>
<script>
/* ══ DÖNEMLER ══════════════════════════════════ */
const PER=[
  {id:"eb",  name:"Erken Bronz Çağı",  dates:"M.Ö. 3000–2000",   s:-3000,e:-2000,c:"#8D5524",bg:"#fff0de"},
  {id:"mb",  name:"Orta-Geç Bronz Çağı",dates:"M.Ö. 2000–1180",  s:-2000,e:-1180,c:"#c04428",bg:"#fce8e0"},
  {id:"ira", name:"Demir Çağı / Arkaik",dates:"M.Ö. 1180–500",   s:-1180,e:-500, c:"#7b5ea7",bg:"#f0eaf8"},
  {id:"cls", name:"Klasik / Hellenistik",dates:"M.Ö. 500–85",     s:-500, e:-85,  c:"#1565C0",bg:"#e3edf8"},
  {id:"rom", name:"Roma Dönemi",        dates:"M.Ö. 85–M.S. 400", s:-85,  e:400,  c:"#6650c8",bg:"#eeecfc"},
  {id:"byz", name:"Bizans Dönemi",      dates:"M.S. 400–1354",    s:400,  e:1354, c:"#c59c00",bg:"#fffbe0"},
  {id:"ott", name:"Osmanlı Dönemi",     dates:"M.S. 1354–1918",   s:1354, e:1918, c:"#b71c1c",bg:"#fce4e4"},
  {id:"ww1", name:"I. Dünya Savaşı",    dates:"M.S. 1915–1918",   s:1914, e:1919, c:"#37474F",bg:"#eceff1"},
];
const gp=y=>{
  const p=PER.find(p=>y>=p.s&&y<p.e);
  if(p)return p;
  if(y>=1918)return PER[6];
  if(y>=400) return PER[5];
  return PER[0];
};

/* ══ TARİHİ ALANLAR ════════════════════════════
   t: "cm"=circleMarker, "rt"=rectangle, "pg"=polygon
   pid: dönem id'si
   a: [başlangıç yılı, bitiş yılı]  (negatif=BC)
═══════════════════════════════════════════════ */
// Yardımcı: küçük dikdörtgen (merkez lat/lng + boyut metre)
function mRect(lat,lng,wM,hM){
  const dlt=hM/2/111000, dln=wM/2/(111000*Math.cos(lat*Math.PI/180));
  return[[lat-dlt,lng-dln],[lat+dlt,lng+dln]];
}
// Çember köşeleri
function mRing(lat,lng,rM,n=32){
  const dlt=rM/111000, dln=rM/(111000*Math.cos(lat*Math.PI/180));
  return Array.from({length:n},(_,i)=>{
    const a=2*Math.PI*i/n;
    return[lat+dlt*Math.sin(a), lng+dln*Math.cos(a)];
  });
}

const STR=[
  /* ── TRUVA / HİSARLIK ──────────────────────── */
  {pid:"eb", a:[-3000,-2000],t:"pg",c:mRing(39.9573,26.2387,80),
   n:"Troy I–II (Hisarlık)",  d:"M.Ö. 3000–2000. İlk taş surlar, megaron saraylar. Schliemann'ın 'Priamos Hazinesi'ni bulduğu tabaka (Troy II, M.Ö. ~2300)."},
  {pid:"mb", a:[-2000,-1180],t:"pg",c:mRing(39.9573,26.2387,90),
   n:"Troy III–VII (Hisarlık)",d:"M.Ö. 2000–1180. Troy VI'da (M.Ö. 1750) büyük surlar inşa edildi. Büyük olasılıkla Homeros'un Truvası. M.Ö. ~1180'de büyük yangın ve yıkım — olası Truva Savaşı."},
  {pid:"cls", a:[-700,-85],  t:"pg",c:mRing(39.9573,26.2387,130),
   n:"İlion (Yunan Truvası)", d:"M.Ö. 700–85. Yunan şehri İlion. Büyük İskender M.Ö. 334'te Pers seferinden önce Athena'ya kurban sundu. Agora, tapınak ve stoa inşa edildi."},
  {pid:"rom", a:[-85,400],   t:"pg",c:mRing(39.9573,26.2387,200),
   n:"Ilium Novum (Roma)",    d:"Roma İliumu. Augustus döneminde genişletildi. Athena tapınağı, odeon, bouleuterion ve hamam. Roma, Truva'yı ata yurdu sayıyordu — Aeneas efsanesi."},
  {pid:"ott", a:[1871,1922], t:"rt",c:mRect(39.9573,26.2387,80,60),
   n:"Schliemann Kazı Alanı", d:"Heinrich Schliemann 1871'de kazılarına başladı. 1873'te Priamos Hazinesi'ni buldu. Wilhelm Dörpfeld (1893) ve Carl Blegen (1932) çalışmalarıyla Truva bilimsel olarak tanımlandı."},

  /* ── SİGEİON (Yeniköy) ─────────────────────── */
  {pid:"ira", a:[-700,-85],  t:"cm",c:[39.974,26.154],radius:14,
   n:"Sigeion",               d:"M.Ö. 7. yüzyılda Atinalılar tarafından kurulan koloni şehri. Skamandros (Karamenderes) nehri ağzındaki stratejik konumu nedeniyle Atina ve Lesbos arasında uzun süre el değiştirdi."},

  /* ── ALEXANDREİA TROAS (Dalyan) ────────────── */
  {pid:"cls", a:[-300,400],  t:"rt",c:mRect(39.757,26.158,600,500),
   n:"Alexandria Troas",      d:"M.Ö. 300'de Antigonos tarafından kuruldu, sonra Lizimakhos tarafından genişletildi. Hellenistik ve Roma döneminin en büyük Troad şehirlerinden biri. Devasa hamamlar, tiyatro ve ticaret limanı. Aziz Pavlus buradan geçti (Elç. 16:8)."},
  {pid:"rom", a:[1,400],     t:"cm",c:[39.757,26.158],radius:18,
   n:"Troas Hamamları",       d:"Roma döneminin en büyük hamam komplekslerinden biri. Devasa kemerli yapılar bugün hâlâ ayakta. Hamadryad Suyu olarak bilinen kaynak suyu aqueduct ile taşınıyordu."},

  /* ── ASSOS (Behramkale) ─────────────────────── */
  {pid:"ira", a:[-900,-85],  t:"cm",c:[39.492,26.337],radius:16,
   n:"Assos — Athena Tapınağı",d:"M.Ö. 6. yüzyılda Aiol Yunanlıları tarafından kurulan şehir. Tapınak M.Ö. 530'da inşa edildi; Anadolu'nun ayakta kalan en eski Dor tapınaklarından biri. Aristoteles burada 3 yıl yaşadı (M.Ö. 348–345). Büyük İskender kenti ziyaret etti."},
  {pid:"cls", a:[-300,200],  t:"rt",c:mRect(39.492,26.337,400,300),

const isSea = pid => PROF[pid]?.sea === true;

/* Güzergahın deniz üzerinden geçip geçmediğini tespit et
   (grid üzerinde düşük rakımlı / su seviyesi hücre oranı) */
function detectSea(grid, ROWS, COLS){
  if(!grid||!grid.length)return false;
  const waterCells=grid.filter(n=>n.w);
  const waterFrac=waterCells.length/grid.length;
  // %3'ten fazla su hücresi varsa deniz geçişi var
  if(waterFrac>0.03)return true;
  // Merkez sütun kontrolü (bbox grid için)
  if(ROWS&&COLS){
    const midC=Math.floor(COLS/2);
    let cnt=0;
    for(let r=0;r<ROWS;r++){if(grid[r*COLS+midC]?.w)cnt++;}
    if(cnt>=1)return true;
  }
  return false;
}

function eraProfs(y, hasSea=false){
  const land = y<=-1180 ? ['walk','donkey','kağnı']
    : y<=-500  ? ['walk','donkey','chariot','kağnı']
    : y<=-85   ? ['walk','donkey','horse','atArab']
    : y<=400   ? ['walk','horse','roman','litter']
    : y<=1354  ? ['walk','horse','atArab','donkey']
    : y<=1913  ? ['walk','ulak','beygir','donkey','kağnı']
    :            ['walk','soldier','ulak','beygir'];

  if(!hasSea) return land;

  // Döneme uygun deniz araçları
  const sea = y<=-1180 ? ['sandal']
    : y<=-500  ? ['sandal','yelkenli']
    : y<=-85   ? ['yelkenli','trireme']
    : y<=400   ? ['trireme','yelkenli']
    : y<=1354  ? ['dromon','yelkenli']
    : y<=1850  ? ['kayık','yelkenli']
    : y<=1913  ? ['vapur','kayık']
    :            ['mGemisi','vapur'];

  // Deniz araçlarını öne al
  return [...sea, ...land];
}

function pinIco(lbl,col,s){

  return L.divIcon({className:'',iconSize:[30,40],iconAnchor:[15,40],
    html:`<div style="filter:drop-shadow(0 3px 8px rgba(0,0,0,.45))">
      <svg width="30" height="40" viewBox="0 0 30 40">
        <path d="M15 0C6.72 0 0 6.72 0 15 0 24.38 15 40 15 40S30 24.38 30 15C30 6.72 23.28 0 15 0z" fill="${col}"/>
        <circle cx="15" cy="15" r="7" fill="white" opacity=".92"/>${r}

        font-size:11px;font-weight:900;color:${col}">${lbl}</div>

}

function addWP(ll){
  const id=uid++,idx=wps.length;

  const wp={id,ll:[ll.lat,ll.lng],m,lbl,col};
  wps.push(wp);
  m.on('click',e=>{e.originalEvent.stopPropagation();sel===wp?desel():selWP(wp);});
  m.on('drag',()=>{wp.ll=[m.getLatLng().lat,m.getLatLng().lng];drawPH();});
  m.on('dragend',()=>{wp.ll=[m.getLatLng().lat,m.getLatLng().lng];if(wps.length>=2)calcR();});
  updBar();if(wps.length>=2)calcR();
}
function selWP(wp){
  if(sel&&sel!==wp)sel.m.setIcon(pinIco(sel.lbl,sel.col,false));
  sel=wp;wp.m.setIcon(pinIco(wp.lbl,wp.col,true));
  const b=document.getElementById('btn-del');b.disabled=false;b.textContent='🗑 '+wp.lbl+' Sil';
  document.querySelectorAll('.rs').forEach((el,i)=>el.classList.toggle('sel',wps[i]===wp));

  if(!sel)return;

function clrRL(){
  Object.values(RL).forEach(l=>{
    if(Array.isArray(l))l.forEach(x=>{try{map.removeLayer(x);}catch(_){}});
    else{try{map.removeLayer(l);}catch(_){}}
  });
  RL={};
}
function drawPH(){
  clrRL();if(wps.length<2)return;
  RL._ph=L.polyline(wps.map(w=>w.ll),{color:'#aaa',weight:1.5,opacity:.3,dashArray:'6,6'}).addTo(map);
}
function pd(a,b){const dy=(b.lat-a.lat)*111000,dx=(b.lng-a.lng)*85000;return Math.sqrt(dy*dy+dx*dx);}
function chaikin(pts,n){
  let c=pts;
  for(let it=0;it<n;it++){
    const nx=[c[0]];
    for(let i=0;i<c.length-1;i++){
      const p=c[i],q=c[i+1];
      nx.push([p[0]*.75+q[0]*.25,p[1]*.75+q[1]*.25]);
      nx.push([p[0]*.25+q[0]*.75,p[1]*.25+q[1]*.75]);
    }
    nx.push(c[c.length-1]);c=nx;
  }
  return c;
}
/* ══ YÜKSEKLİK VERİSİ ══════════════════════════
   1. Önce AWS Terrain Tiles dene (hızlı, limit yok)
   2. Eğer tüm değerler 0 çıkarsa (CORS/güvenlik engeli):
      → Open-Meteo JSON API'ye geç (güvenilir ama yavaş)
   Debug göstergesi: yeşil = tile, sarı = API, kırmızı = başarısız
════════════════════════════════════════════════ */
const _tC={};
function _setDebug(state){
  // Küçük dot → routing butonuna renk ekle
  const colors={tile:'#18956a',api:'#bf7a2a',fail:'#cc3333',load:'#888'};
  const el=document.getElementById('spin');
  if(el)el.style.borderLeft=`3px solid ${colors[state]||'#888'}`;
}

function _loadTile(z,x,y){
  const key=`${z}/${x}/${y}`;
  if(_tC[key])return Promise.resolve(_tC[key]);
  return new Promise(res=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const cv=document.createElement('canvas');
        cv.width=cv.height=256;
        cv.getContext('2d').drawImage(img,0,0);
        // Test: ilk pikseli oku — CORS engeli varsa exception atar
        cv.getContext('2d').getImageData(0,0,1,1);
        _tC[key]=cv;res(cv);
      }catch(e){
        // CORS engeli: canvas tainted → tile kullanılamaz
        _tC[key]=null;res(null);
      }
    };
    img.onerror=()=>{_tC[key]=null;res(null);};
    img.src=`https://s3.amazonaws.com/elevation-tiles-prod/terrarium/${z}/${x}/${y}.png`;
  });
}

function _tileInfo(lat,lng,z){
  const n=1<<z;
  const tx=Math.floor((lng+180)/360*n);
  const latR=lat*Math.PI/180;
  const ty=Math.floor((1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n);
  const px=((lng+180)/360*n-tx)*256;
  const py=((1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n-ty)*256;
  return{tx,ty,px:Math.max(0,Math.min(255,px|0)),py:Math.max(0,Math.min(255,py|0))};
}

async function _fetchTiles(pts,z){
  const infos=pts.map(p=>_tileInfo(p.lat,p.lng,z));
  const keys=new Set(infos.map(t=>`${z}/${t.tx}/${t.ty}`));
  const tiles={};
  await Promise.all([...keys].map(async k=>{
    const[tz,tx,ty]=k.split('/').map(Number);
    tiles[k]=await _loadTile(tz,tx,ty);
  }));
  return pts.map((_,i)=>{
    const{tx,ty,px,py}=infos[i];
    const cv=tiles[`${z}/${tx}/${ty}`];
    if(!cv)return 0;
    try{
      const d=cv.getContext('2d').getImageData(px,py,1,1).data;
      return Math.max(0,(d[0]*256+d[1]+d[2]/256)-32768);
    }catch(e){return 0;}
  });
}

async function _fetchAPI(pts){
  // 1. Open-Meteo dene (hızlı, limit yok)
  const res=new Array(pts.length).fill(0);
  const B=100;
  await Promise.all(
    Array.from({length:Math.ceil(pts.length/B)},(_,i)=>i).map(async idx=>{
      const batch=pts.slice(idx*B,(idx+1)*B);
      if(idx>0)await new Promise(ok=>setTimeout(ok,idx*50));
      const lats=batch.map(p=>p.lat.toFixed(5)).join(',');
      const lngs=batch.map(p=>p.lng.toFixed(5)).join(',');
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`);
        const d=await r.json();
        if(d.elevation)d.elevation.forEach((e,j)=>{res[idx*B+j]=typeof e==='number'?Math.max(0,e):0;});
      }catch(_){}
    })
  );
  if(res.filter(e=>e>1).length/pts.length > 0.3){_setDebug('api');return res;}

  // 2. Fallback: OpenTopoData SRTM (daha yavaş ama güvenilir)
  const res2=new Array(pts.length).fill(0);
  for(let i=0;i<pts.length;i+=50){
    const sl=pts.slice(i,i+50);
    const locs=sl.map(p=>`${p.lat.toFixed(4)},${p.lng.toFixed(4)}`).join('|');
    try{
      const r=await fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${locs}`);
      const d=await r.json();
      if(d.status==='OK')d.results.forEach((item,j)=>{res2[i+j]=item.elevation||0;});
    }catch(_){}
    if(i+50<pts.length)await new Promise(ok=>setTimeout(ok,1200));
  }
  const valid2=res2.filter(e=>e>1).length;
  _setDebug(valid2>pts.length*0.2?'api':'fail');
  return res2;
}

async function fetchElev(pts,z=12){
  if(!pts||!pts.length)return[];
  _setDebug('load');
  // 1. Terrain tiles dene
  const tileRes=await _fetchTiles(pts,z);
  const validTile=tileRes.filter(e=>e>1).length;
  if(validTile/pts.length > 0.15){
    _setDebug('tile');
    return tileRes;
  }
  // 2. Fallback: Open-Meteo API
  const apiRes=await _fetchAPI(pts);
  const validAPI=apiRes.filter(e=>e>1).length;
  _setDebug(validAPI>pts.length*0.1?'api':'fail');
  return apiRes;
}
function kNN(grid,lat,lng,k){
  return grid.map((n,i)=>({i,d:(n.lat-lat)**2+(n.lng-lng)**2}))
    .sort((a,b)=>a.d-b.d).slice(0,k).map(x=>x.i);
}
/* ── Binary Min-Heap (A* için O(log n) push/pop) ─ */
class _Heap{
  constructor(){this.d=[];}
  push(v){this.d.push(v);this._up(this.d.length-1);}
  pop(){
    const t=this.d[0],l=this.d.pop();
    if(this.d.length){this.d[0]=l;this._dn(0);}
    return t;
  }
  get size(){return this.d.length;}
  _up(i){
    while(i>0){
      const p=(i-1)>>1;
      if(this.d[p][0]<=this.d[i][0])break;
      [this.d[p],this.d[i]]=[this.d[i],this.d[p]];i=p;
    }
  }
  _dn(i){
    const n=this.d.length;
    for(;;){
      let s=i,l=2*i+1,r=2*i+2;
      if(l<n&&this.d[l][0]<this.d[s][0])s=l;
      if(r<n&&this.d[r][0]<this.d[s][0])s=r;
      if(s===i)break;
      [this.d[s],this.d[i]]=[this.d[i],this.d[s]];i=s;
    }
  }
}

function astar(grid,ROWS,COLS,si,ei,costFn){
  const N=ROWS*COLS;
  const dist=new Float64Array(N).fill(1e18);
  const prev=new Int32Array(N).fill(-1);
  const vis=new Uint8Array(N);
  dist[si]=0;
  const eg=grid[ei];
  const h=i=>{const n=grid[i];return pd(n,eg);};
  const pq=new _Heap();pq.push([0,si]);
  const MAX=N*30; let itr=0;
  while(pq.size&&itr++<MAX){
    const[,cur]=pq.pop();
    if(vis[cur])continue;vis[cur]=1;if(cur===ei)break;
    const r=Math.floor(cur/COLS),c=cur%COLS,cn=grid[cur];
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const ni=nr*COLS+nc;if(vis[ni])continue;
      const nn=grid[ni];
      const hd=pd(cn,nn);
      const sl=Math.abs(nn.e-cn.e)/Math.max(hd,1);
      const nd=dist[cur]+hd*(1+costFn(sl,nn.en,nn.ridgeN||0,nn.w||false));
      if(nd<dist[ni]){dist[ni]=nd;prev[ni]=cur;pq.push([nd+h(ni),ni]);}
    }
  }
  const path=[];let cur=ei;
  while(cur!==-1&&path.length<2000){path.unshift(grid[cur]);cur=prev[cur];}
  return{path,cost:dist[ei]};
}

/* ══ ÇOKLU MODLU ROTA (Deniz + Kara) ══════════════
   1. Deniz aracı A* ile geçiş noktaları (port) bulunur
   2. Her kara aracı için  start→portA  ve  portB→end  hesaplanır
   3. Her deniz aracı için portA→portB hesaplanır
   4. Kullanıcı her bölümde araç seçer, toplam süre güncellenir
═══════════════════════════════════════════════════ */
let _mm = null; // aktif multi-modal veri

// Bir segment için tüm araçları hesapla
function calcSegRoutes(grid,ROWS,COLS,fromLL,toLL,profIds){
  const routes={};
  const hasElev=grid.some(n=>n.e>1);
  for(const pid of profIds){
    const pr=PROF[pid];
    const sCands=kNN(grid,fromLL[0],fromLL[1],2);
    const eCands=kNN(grid,toLL[0],toLL[1],2);
    let bPath=null,bCost=1e18;
    for(const si of sCands)for(const ei of eCands){
      const{path,cost}=astar(grid,ROWS,COLS,si,ei,pr.cost);
      if(cost<bCost){bCost=cost;bPath=path;}
    }
    if(!bPath||!bPath.length)bPath=[];
    const raw=[fromLL,...bPath.map(n=>[n.lat,n.lng]),toLL];
    const sm=chaikin(raw,3);
    sm[0]=fromLL;sm[sm.length-1]=toLL;
    let km=0,gainM=0,lossM=0,maxSlPct=0;
    for(let i=1;i<sm.length;i++){
      const d=pd({lat:sm[i-1][0],lng:sm[i-1][1]},{lat:sm[i][0],lng:sm[i][1]});
      km+=d;
      if(bPath[i-1]&&bPath[i]){
        const dE=bPath[i].e-bPath[i-1].e;
        const slPct=Math.abs(dE)/Math.max(d,1)*100;
        if(dE>0)gainM+=dE;else lossM+=Math.abs(dE);
        if(slPct>maxSlPct)maxSlPct=slPct;
      }
    }
    km/=1000;
    routes[pid]={coords:sm,km,h:realH(km,pr),gainM:Math.round(gainM),lossM:Math.round(lossM),maxSlPct:Math.round(maxSlPct),hasElev};
  }
  return routes;
}

async function calcMultiModal(grid,ROWS,COLS,startLL,endLL){
  const seaPids=eraProfs(yr,true).filter(p=>isSea(p));
  if(!seaPids.length)return null;

  /* PORT TESPİTİ: startLL→endLL düz hattı üzerinde 60 nokta örnekle.
     İlk su bloğunun hemen öncesi = portA, son su bloğunun hemen sonrası = portB.
     Bu yöntem A*'tan çok daha güvenilir — gemi kıyı takip etmez. */
  const N=80;
  const samples=[];
  for(let i=0;i<N;i++){
    const t=i/(N-1);
    samples.push({
      lat:startLL[0]+(endLL[0]-startLL[0])*t,
      lng:startLL[1]+(endLL[1]-startLL[1])*t
    });
  }
  const sampE=await fetchElev(samples,12); // zoom 12: boğaz gibi dar geçişler için
  const sampW=sampE.map(e=>(e||0)<2);

  // En geniş su segmentini bul (dar kıyı şeritleri değil, asıl su geçişi)
  const waterRanges=[];
  let wStart=-1;
  for(let i=0;i<N;i++){
    if(sampW[i]&&wStart===-1)wStart=i;
    else if(!sampW[i]&&wStart!==-1){waterRanges.push([wStart,i-1]);wStart=-1;}
  }
  if(wStart!==-1)waterRanges.push([wStart,N-1]);
  if(!waterRanges.length)return null;

  // En geniş su aralığı = asıl geçiş noktası
  const main=waterRanges.reduce((a,b)=>(b[1]-b[0])>(a[1]-a[0])?b:a);
  const portALL=samples[Math.max(0,main[0]-1)];
  const portBLL=samples[Math.min(N-1,main[1]+1)];
  if(!portALL||!portBLL)return null;

  if(pd(portALL,portBLL)<500)return null; // çok yakınsa geçiş değil

  // Deniz mesafesi ve doğrudan koordinatlar
  const seaKm=pd({lat:portALL.lat,lng:portALL.lng},{lat:portBLL.lat,lng:portBLL.lng})/1000;

  /* Deniz segmenti: doğrudan düz çizgi (gemi kıyı takip etmez).
     Her deniz aracı için aynı koordinatlar, sadece süre farklı. */
  const sea={};
  seaPids.forEach(pid=>{
    const pr=PROF[pid];
    const h=seaKm/pr.speed;
    sea[pid]={
      coords:[[portALL.lat,portALL.lng],[portBLL.lat,portBLL.lng]],
      km:seaKm, h
    };
  });

  /* Kara segmentleri: A*  */
  const landPids=eraProfs(yr,false);
  const land1=calcSegRoutes(grid,ROWS,COLS,startLL,[portALL.lat,portALL.lng],landPids);
  const land2=calcSegRoutes(grid,ROWS,COLS,[portBLL.lat,portBLL.lng],endLL,landPids);

  return{
    portALL:[portALL.lat,portALL.lng],
    portBLL:[portBLL.lat,portBLL.lng],
    seaKm,
    land1,sea,land2,
    landPids,seaPids,
    sel:{l1:landPids[0],sea:seaPids[0],l2:landPids[0]}
  };
}

/* Multi-modal harita çizimi */
function updMMMap(){
  if(!_mm)return;
  ['_mm1','_mmsea','_mm2'].forEach(k=>{
    if(RL[k]){try{map.removeLayer(RL[k]);}catch(_){}delete RL[k];}
  });
  // Önceki ek deniz çizgilerini temizle
  (RL._extraSea||[]).forEach(l=>{try{map.removeLayer(l);}catch(_){}});
  RL._extraSea=[];

  const{sel,land1,sea,land2}=_mm;
  const r1=land1[sel.l1],rsea=sea[sel.sea],r2=land2[sel.l2];
  if(r1?.coords?.length>1)
    RL._mm1=L.polyline(r1.coords,{color:'#888',weight:3,opacity:.7,dashArray:'5,5',lineJoin:'round'}).addTo(map);
  if(rsea)
    RL._mmsea=L.polyline([_mm.portALL,_mm.portBLL],{color:PROF[sel.sea].color,weight:4,opacity:.9,dashArray:PROF[sel.sea].dash,lineJoin:'round'}).addTo(map);
  if(r2?.coords?.length>1)
    RL._mm2=L.polyline(r2.coords,{color:'#888',weight:3,opacity:.7,dashArray:'5,5',lineJoin:'round'}).addTo(map);

  // Diğer segmentlerdeki deniz geçişleri de mavi çiz
  if(_mm.segInfos){
    const seaColor=PROF[sel.sea]?.color||'#0077cc';
    const seaDash=PROF[sel.sea]?.dash||null;
    _mm.segInfos.forEach(info=>{
      if(!info.mm||info.mm===_mm)return; // ilk geçiş zaten çizildi
      // portALL ve portBLL aynı obje mi kontrol et
      const pA=info.mm.portALL,pB=info.mm.portBLL;
      if(!pA||!pB)return;
      const l=L.polyline([pA,pB],{color:seaColor,weight:4,opacity:.85,dashArray:seaDash,lineJoin:'round'}).addTo(map);
      RL._extraSea.push(l);
    });
  }

  if(RL._mmsea)RL._mmsea.bringToFront();
  (RL._extraSea||[]).forEach(l=>l.bringToFront());
  updMMTotal();
}

function updMMTotal(){
  if(!_mm)return;
  const{sel}=_mm;
  let h=0,km=0;
  if(_mm.segInfos){
    _mm.segInfos.forEach(info=>{
      if(info.mm){
        // Deniz geçişi segmenti: kara1 + deniz + kara2
        const m=info.mm;
        const r1=m.land1?.[sel.l1],r2=m.land2?.[sel.l2];
        const seaRes=m.sea?.[sel.sea];
        h+=(r1?.h||0)+(seaRes?.h||0)+(r2?.h||0);
        km+=(r1?.km||0)+(seaRes?.km||0)+(r2?.km||0);
      } else {
        // Saf kara segmenti: seçili kara aracına göre
        const r=info.routes?.[sel.l1];
        h+=(r?.h||0);km+=(r?.km||0);
      }
    });
  } else {
    // Fallback: sadece ilk geçiş
    const{land1,sea,land2}=_mm;
    h=(land1[sel.l1]?.h||0)+(sea[sel.sea]?.h||0)+(land2[sel.l2]?.h||0);
    km=(land1[sel.l1]?.km||0)+(sea[sel.sea]?.km||0)+(land2[sel.l2]?.km||0);
  }
  const ni=nightInfo(h);
  document.getElementById('mm-total').innerHTML=
    `<span style="font-size:17px;font-weight:700">${fmtT(h)}</span> &nbsp;
     <span style="color:#888;font-size:12px">${km.toFixed(1)} km</span>
     <div style="font-size:11px;color:${ni.c};margin-top:2px">${ni.t}</div>`;
  document.getElementById('ts-dist').textContent=km.toFixed(2)+' km';
}

function renderMultiModal(){
  if(!_mm)return;
  document.getElementById('vtabs').style.display='none';
  document.getElementById('vcards').style.display='none';
  document.getElementById('mm-wrap').style.display='flex';

  const o1=document.getElementById('mm-opts1');
  const osea=document.getElementById('mm-optssea');

}

async function calcR(){
  if(wps.length<2)return;
  const myId=++cid;
  document.getElementById('spin').classList.add('on');
  drawPH();
  try{
    const landPids=eraProfs(yr,false);

    /* ── Her segment bağımsız işlenir ──────────────────────
       H eklenmesi sadece G→H segmentini etkiler.
       Diğer segmentlerin kendi grid'i, kendi elevation verisi var.
    ═══════════════════════════════════════════════════════ */
    const segInfos=[];
    for(let seg=0;seg<wps.length-1;seg++){
      const info=await _procSeg(wps[seg].ll,wps[seg+1].ll,myId);
      if(!info||myId!==cid)return;
      segInfos.push(info);
    }

    // Tüm segmentlerin sonuçlarını araç bazında birleştir
    const hasAnySea=segInfos.some(s=>s.mm);
    const results={};
    for(const pid of landPids){
      const pr=PROF[pid];
      let allC=[],totKm=0,totGain=0,totLoss=0,maxSlPct=0,hasElev=false;
      for(const info of segInfos){
        let coords,km,gainM=0,lossM=0,slMax=0,hE=false;
        if(info.mm){
          // Su geçişi: kara1 + deniz düz + kara2
          const m=info.mm;
          const r1=m.land1[pid],r2=m.land2[pid];
          coords=[];
          if(r1?.coords?.length>1)coords.push(...r1.coords);
          else coords.push(m.portALL);
          coords.push(m.portBLL);
          if(r2?.coords?.length>1)coords.push(...r2.coords.slice(1));
          else coords.push(info.toLL);
          km=(r1?.km||0)+m.seaKm+(r2?.km||0);
          hE=true;
        } else {
          const r=info.routes[pid];
          coords=r?.coords||[info.fromLL,info.toLL];
          km=r?.km||0;gainM=r?.gainM||0;lossM=r?.lossM||0;slMax=r?.maxSlPct||0;hE=r?.hasElev||false;
        }
        if(coords.length>0){
          if(allC.length===0)allC.push(...coords);else allC.push(...coords.slice(1));
        }
        totKm+=km;totGain+=gainM;totLoss+=lossM;maxSlPct=Math.max(maxSlPct,slMax);if(hE)hasElev=true;
      }
      results[pid]={coords:allC,km:totKm,gainM:Math.round(totGain),lossM:Math.round(totLoss),maxSlPct:Math.round(maxSlPct),hasElev};
    }
    if(myId!==cid)return;
    lRes=results;

    if(hasAnySea){
      const firstMM=segInfos.find(s=>s.mm).mm;
      _mm={...firstMM, segInfos}; // tüm segmentleri sakla
      document.getElementById('vtabs').style.display='none';
      document.getElementById('vcards').style.display='none';
      document.getElementById('mm-wrap').style.display='flex';
      clrRL();
      landPids.forEach(pid=>{
        const res=results[pid];if(!res)return;
        const pr=PROF[pid];
        RL[pid]=L.polyline(res.coords,{color:pr.color,weight:pr.w,opacity:.65,dashArray:pr.dash,lineJoin:'round'}).addTo(map);
      });
      renderMultiModal();
    } else {
      _mm=null;
      document.getElementById('vtabs').style.display='';
      document.getElementById('vcards').style.display='';
      document.getElementById('mm-wrap').style.display='none';
      let elevTxt='';
      try{
        const we=await fetchElev(wps.map(w=>({lat:w.ll[0],lng:w.ll[1]})));
        if(myId!==cid)return;
        if(we.length>=2){
          let up=0,dn=0;
          for(let i=1;i<we.length;i++){const d=we[i]-we[i-1];if(d>0)up+=d;else dn+=Math.abs(d);}
          elevTxt=`${Math.round(we[0])}m → ${Math.round(we[we.length-1])}m · ↑${Math.round(up)}m ↓${Math.round(dn)}m`;
        }
      }catch(_){}
      if(myId!==cid)return;
      renderRoutes(results,landPids,landPids[0],elevTxt);
    }
  }catch(err){console.error('calcR:',err);}
  finally{if(myId===cid)document.getElementById('spin').classList.remove('on');}
}

/* Bir segmentin tam işlenmesi: kendi grid'i + elevation + routing */
async function _procSeg(fromLL,toLL,myId){
  const mnLt=Math.min(fromLL[0],toLL[0]),mxLt=Math.max(fromLL[0],toLL[0]);
  const mnLn=Math.min(fromLL[1],toLL[1]),mxLn=Math.max(fromLL[1],toLL[1]);
  const dLt=Math.max(mxLt-mnLt,.04),dLn=Math.max(mxLn-mnLn,.04);
  const pad=.40;
  const b={mnLt:mnLt-dLt*pad,mxLt:mxLt+dLt*pad,mnLn:mnLn-dLn*pad,mxLn:mxLn+dLn*pad};
  const diagKm=Math.sqrt(((b.mxLt-b.mnLt)*111)**2+((b.mxLn-b.mnLn)*85)**2);
  let ROWS,COLS,tileZ;
  if     (diagKm<25) {ROWS=22;COLS=22;tileZ=13;}
  else if(diagKm<70) {ROWS=28;COLS=28;tileZ=12;}
  else if(diagKm<180){ROWS=34;COLS=34;tileZ=11;}
  else               {ROWS=40;COLS=40;tileZ=10;}
  const grid=[];
  for(let r=0;r<ROWS;r++){
    const lat=b.mnLt+(b.mxLt-b.mnLt)*r/(ROWS-1);
    for(let c=0;c<COLS;c++){
      grid.push({i:grid.length,r,c,lat,lng:b.mnLn+(b.mxLn-b.mnLn)*c/(COLS-1),e:0,en:0,ridgeN:0,w:false});
    }
  }
  const elvs=await fetchElev(grid,tileZ);
  if(myId!==cid)return null;
  elvs.forEach((e,i)=>{grid[i].e=e;});
  const hasElev=elvs.some(e=>e>1);
  const mnE=Math.min(...grid.map(n=>n.e)),mxE=Math.max(...grid.map(n=>n.e));
  const rng=Math.max(mxE-mnE,1);
  grid.forEach(n=>{n.en=(n.e-mnE)/rng;n.w=(n.e<2);});
  grid.forEach(n=>{
    let lower=0,cnt=0;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      if(!dr&&!dc)continue;
      const nr=n.r+dr,nc=n.c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){if(grid[nr*COLS+nc].e<n.e)lower++;cnt++;}
    }
    n.ridgeN=cnt>0?lower/cnt:0;
  });
  grid.forEach(n=>{n._fl=!n.w&&n.ridgeN<0.15&&n.en<0.65&&n.e>1;n._vis=false;});
  grid.forEach(n=>{
    if(!n._fl||n._vis)return;
    const cluster=[],q=[n];
    while(q.length){const cur=q.shift();if(cur._vis)continue;cur._vis=true;cluster.push(cur);
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;
        const nr=cur.r+dr,nc=cur.c+dc;
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){const nn=grid[nr*COLS+nc];if(nn._fl&&!nn._vis)q.push(nn);}
      }
    }
    const rS=new Set(cluster.map(c=>c.r)).size,cS=new Set(cluster.map(c=>c.c)).size;
    if(cluster.length>=3&&rS>=2&&cS>=2)cluster.forEach(cell=>{cell.w=true;});
  });
  // Doğrudan yol örneklemesi
  const pts=[];
  for(let i=0;i<50;i++){const t=i/49;pts.push({lat:fromLL[0]+(toLL[0]-fromLL[0])*t,lng:fromLL[1]+(toLL[1]-fromLL[1])*t});}
  const segE=await fetchElev(pts,12);
  if(myId!==cid)return null;
  let hasSea=false;
  segE.forEach((e,i)=>{if((e||0)<2){hasSea=true;kNN(grid,pts[i].lat,pts[i].lng,6).forEach(idx=>{grid[idx].w=true;});}});
  hasSea=hasSea||detectSea(grid,ROWS,COLS);
  let mm=null;
  if(hasSea){mm=await calcMultiModal(grid,ROWS,COLS,fromLL,toLL);if(myId!==cid)return null;}
  // Kara araçları routing
  const routes={};
  if(!mm){
    const landPids=eraProfs(yr,false);
    for(const pid of landPids){
      const pr=PROF[pid];
      const sC=kNN(grid,fromLL[0],fromLL[1],3),eC=kNN(grid,toLL[0],toLL[1],3);
      let bPath=null,bCost=1e18;
      for(const si of sC)for(const ei of eC){
        const{path,cost}=astar(grid,ROWS,COLS,si,ei,pr.cost);
        if(cost<bCost){bCost=cost;bPath=path;}
      }
      if(!bPath||!bPath.length)bPath=[grid[sC[0]],grid[eC[0]]];
      let gainM=0,lossM=0,maxSlPct=0;
      for(let i=1;i<bPath.length;i++){
        const dE=bPath[i].e-bPath[i-1].e,hd=pd(bPath[i-1],bPath[i]);
        const slPct=Math.abs(dE)/Math.max(hd,1)*100;
        if(dE>0)gainM+=dE;else lossM+=Math.abs(dE);
        if(slPct>maxSlPct)maxSlPct=slPct;
      }
      const raw=[fromLL,...bPath.map(n=>[n.lat,n.lng]),toLL];
      const sm=chaikin(raw,4);sm[0]=fromLL;sm[sm.length-1]=toLL;
      let km=0;for(let i=1;i<sm.length;i++)km+=pd({lat:sm[i-1][0],lng:sm[i-1][1]},{lat:sm[i][0],lng:sm[i][1]});
      km/=1000;
      routes[pid]={coords:sm,km,h:realH(km,pr),gainM:Math.round(gainM),lossM:Math.round(lossM),maxSlPct:Math.round(maxSlPct),hasElev};
    }
  }
  return{fromLL,toLL,mm,routes,hasElev};
}

/* ── Görünüm ──────────────────────── */
function renderRoutes(results,profs,aPid,elevTxt){
  clrRL();
  [...profs].reverse().forEach(pid=>{
    const pr=PROF[pid],res=results[pid];if(!res)return;
    const on=pid===aPid;

    if(res.segs&&res.segs.length>0){
      // Çok modlu: her segment ayrı çizgi
      const lines=[];
      res.segs.forEach((sg,i)=>{
        if(sg.coords.length<2)return;
        const seaSeg=sg.type==='sea';
        const l=L.polyline(sg.coords,{
          color   : seaSeg ? pr.color : '#777',
          weight  : seaSeg ? (on?pr.w+1.5:pr.w*.7) : (on?2:1.5),
          opacity : on ? (seaSeg?0.85:0.55) : (seaSeg?0.18:0.10),
          dashArray: seaSeg ? pr.dash : '5,5',
          lineJoin:'round',lineCap:'round'
        }).addTo(map);
        l.on('click',()=>actV(pid));
        lines.push(l);
      });
      RL[pid]=lines; // dizi olarak sakla
    } else {
      const line=L.polyline(res.coords,{
        color:pr.color,weight:on?pr.w+1.5:pr.w,
        opacity:on?.90:.45,dashArray:pr.dash,lineJoin:'round',lineCap:'round'
      }).addTo(map);
      line.on('click',()=>actV(pid));
      RL[pid]=line;
    }
  });
  // Aktif rotayı öne al
  bringToFront(aPid);
  renderPanel(results,profs,aPid,elevTxt);
}

function bringToFront(pid){
  const l=RL[pid];
  if(!l)return;
  if(Array.isArray(l))l.forEach(x=>{try{x.bringToFront();}catch(_){}});
  else{try{l.bringToFront();}catch(_){}}
}
function actV(pid){
  if(!lRes)return;
  const profs=eraProfs(yr, lRes?Object.keys(lRes).some(k=>isSea(k)):false);
  profs.forEach(p=>{
    const pr=PROF[p],l=RL[p];if(!l)return;
    const on=p===pid;
    const applyStyle=(line,seaSeg)=>{
      if(seaSeg===undefined){
        line.setStyle({weight:on?pr.w+1.5:pr.w*.65,opacity:on?.82:.16});
      } else if(seaSeg){
        line.setStyle({weight:on?pr.w+1.5:pr.w*.7,opacity:on?(0.85):(0.18)});
      } else {
        line.setStyle({weight:on?2:1.5,opacity:on?0.55:0.10});
      }
    };
    if(Array.isArray(l)){
      const segs=lRes[p]?.segs||[];
      l.forEach((line,i)=>applyStyle(line, segs[i]?.type==='sea'));
    } else {
      applyStyle(l);
    }
    if(on) bringToFront(p);
  });
  document.querySelectorAll('.vt').forEach(el=>{
    const on=el.dataset.pid===pid;el.classList.toggle('on',on);
    el.style.background=on?PROF[pid].color:'transparent';
    el.style.borderColor=PROF[el.dataset.pid].color+(on?'':'66');
  });
  document.querySelectorAll('.vc').forEach(el=>{
    const on=el.dataset.pid===pid;
    el.style.borderColor=on?PROF[pid].color:'transparent';
    el.style.background=on?PROF[pid].color+'10':'';
  });
  if(lRes[pid])document.getElementById('ts-dist').textContent=lRes[pid].km.toFixed(2)+' km';
}
function renderPanel(results,profs,aPid,elevTxt){
  document.getElementById('ts-dist').textContent=(results[aPid]?.km||0).toFixed(2)+' km';
  document.getElementById('ts-sub').textContent='Topografya bazlı tahmini güzergah';
  document.getElementById('ts-elev').textContent=elevTxt||'';
  const tabsEl=document.getElementById('vtabs');tabsEl.innerHTML='';
  profs.forEach(pid=>{
    const pr=PROF[pid],on=pid===aPid;
    const t=document.createElement('div');
    t.className='vt'+(on?' on':'');t.dataset.pid=pid;
    t.style.borderColor=pr.color+(on?'':'77');
    if(on)t.style.background=pr.color;
    t.textContent=pr.icon+' '+pr.name;
    t.onclick=()=>actV(pid);tabsEl.appendChild(t);
  });
  const cardsEl=document.getElementById('vcards');cardsEl.innerHTML='';
  profs.forEach(pid=>{
    const pr=PROF[pid],res=results[pid];if(!res)return;
    const on=pid===aPid;
    const h=res.multiModal
      ? (res.seaH||0)+(res.landH||0)
      : realH(res.km, pr);
    const ni=nightInfo(h),q=pr.q[Math.floor(Math.random()*pr.q.length)];

    // Süre satırı
    let timeHtml;
    if(res.multiModal){
      timeHtml=`<div class="vtime">~${fmtT(h)}</div>`;
    } else {
      timeHtml=`<div class="vtime">~${fmtT(h)}</div>`;
    }

    // Km / segment özeti
    let kmHtml;
    if(res.multiModal){
      kmHtml=`
        <span class="vkm" style="background:${pr.color}">🌊 ${res.seaKm.toFixed(1)} km</span>
        <span class="vkm" style="background:#777">🚶 ${res.landKm.toFixed(1)} km kara</span>
        <div style="font-size:10px;color:#888;margin-top:3px">
          ${pr.icon} ${fmtT(res.seaH)} + 🚶 ${fmtT(res.landH)} = <b>${fmtT(h)}</b> toplam
        </div>`;
    } else if(isSea(pid)){
      kmHtml=`<span class="vkm" style="background:${pr.color}">${res.km.toFixed(1)} km</span>
              <span class="vsea">🌊 Deniz güzergahı</span>`;
    } else {
      kmHtml=`<span class="vkm" style="background:${pr.color}">${res.km.toFixed(1)} km</span>
              <span style="font-size:9px;color:#aaa;margin-left:3px">~${pr.dailyKm} km/gün</span>`;
    }

    const el=document.createElement('div');
    el.className='vc';el.dataset.pid=pid;
    el.style.borderColor=on?pr.color:'transparent';
    el.style.background=on?pr.color+'10':'';
    el.innerHTML=`
      <div class="vi">${pr.icon}</div>
      <div class="vb">
        <div class="vt2">
          <div><div class="vn">${pr.name}</div><div class="ve">${pr.era}</div></div>
          ${timeHtml}
        </div>
        <div class="vnight" style="color:${ni.c}">${ni.t}</div>
        ${kmHtml}
        <div class="vslope">${res.hasElev
          ? `<span>↑${res.gainM}m</span><span>↓${res.lossM}m</span><span>maks %${res.maxSlPct}</span>`
          : `<span style="color:#bbb;font-style:italic">yükseklik verisi yükleniyor…</span>`
        }</div>
        <div class="vq">"${q}"</div>
      </div>`;
    el.onclick=()=>actV(pid);cardsEl.appendChild(el);
  });
  tsShow();
}
function fmtT(h){
  if(h<1/60)return'<1 dak';if(h<1)return Math.round(h*60)+' dak';
  const hh=Math.floor(h),mm=Math.round((h-hh)*60);
  if(hh>=24){const d=Math.floor(hh/24),r=hh%24;return d+' gün'+(r?' '+r+'sa':'');}
  return hh+' saat'+(mm?' '+mm+' dak':'');
}
// Gerçekçi yolculuk süresi: dailyKm ile günlük mesafe sınırı, dinlenme dahil
function realH(km, pr){
  if(!pr.dailyKm) return km/pr.speed;
  // Günlük mesafe limitinden kaç takvim günü sürer?
  const days=km/pr.dailyKm;
  // Günlük: günde ~10h yolculuk, ~14h dinlenme/uyku/yemek
  return days*24; // 24h/gün × gün sayısı = gerçek geçen süre
}
function nightInfo(h){
  if(h<10) return{t:'Gün içinde yetişirsin ☀️',c:'#18956a'};
  if(h<24) return{t:'1 gece yolda geçirirsin 🌙',c:'#bf7a2a'};
  const n=Math.floor(h/24);
  return{t:n+' gece yolda konaklama 🌙',c:'#c04428'};
}

/* ── Bottom sheet drag ─────────────── */
const TS_PEEK=58,TS_DEFAULT=240;
const tsMaxH=()=>Math.round(document.getElementById('map').clientHeight*.78);
let _tsH=0;

function tsSetH(h,anim){
  h=Math.max(TS_PEEK,Math.min(tsMaxH(),h));_tsH=h;
  const el=document.getElementById('ts');
  el.style.transition=anim?'height .22s cubic-bezier(.4,0,.2,1)':'none';
  el.style.height=h+'px';
}
function tsShow(t){
  if(_tsH>=TS_PEEK){tsSetH(t||TS_DEFAULT,true);return;}
  const el=document.getElementById('ts');
  el.style.transition='none';el.style.height='0px';
  requestAnimationFrame(()=>tsSetH(t||TS_DEFAULT,true));
}
function tsMinimize(){tsSetH(TS_PEEK,true);}
function closeTS(){tsMinimize();}
// Tamamen gizle (cancelT sonrası FAB arkasında kalmasın)
function tsHide(){
  _tsH=0;
  const el=document.getElementById('ts');
  el.style.transition='height .22s cubic-bezier(.4,0,.2,1)';
  el.style.height='0px';
}

(function(){
  const handle=document.getElementById('ts-drag');
  const head=document.getElementById('ts-head');
  if(!handle)return;
  let sy=0,sh=0,drag=false;
  function dn(y){drag=true;sy=y;sh=_tsH;document.getElementById('ts').style.transition='none';}
  function mv(y){if(!drag)return;tsSetH(sh+(sy-y),false);}
  function up(){if(!drag)return;drag=false;if(_tsH<TS_PEEK+30)tsSetH(TS_PEEK,true);}
  [handle,head].forEach(el=>{
    el.addEventListener('touchstart',e=>{e.stopPropagation();dn(e.touches[0].clientY);},{passive:true});
    el.addEventListener('touchmove', e=>{e.stopPropagation();mv(e.touches[0].clientY);},{passive:true});
    el.addEventListener('touchend',  ()=>up(),{passive:true});
    el.addEventListener('mousedown', e=>{dn(e.clientY);
      const mm=ev=>mv(ev.clientY);
      const mu=()=>{up();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
      document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    });
  });
})();

/* ── Zaman çizelgesi ──────────────── */
function updTrack(){
  const p=gp(yr),pct=((yr+3000)/4922)*100;
  document.getElementById('tl-sl').style.background=
    `linear-gradient(to right,${p.c} ${pct}%,#e0e0e0 ${pct}%)`;
}
function setYear(y){
  yr=y;const p=gp(y);
  document.getElementById('tl-y').textContent=(y<0?'M.Ö.':'M.S.')+' '+Math.abs(y);
  document.getElementById('tl-p').textContent=p.name;
  document.getElementById('tl-p').style.background=p.bg;
  document.getElementById('tl-p').style.color=p.c;
  updTrack();redraw(y);
  document.querySelectorAll('.pl').forEach(el=>{
    const on=el.dataset.pid===p.id;el.classList.toggle('active',on);
    el.style.background=on?p.c:'';el.style.color=on?'#fff':'';
  });
  if(wps.length>=2)calcR();
}
function jumpTo(y){document.getElementById('tl-sl').value=y;setYear(y);closeSheet();}
document.getElementById('tl-sl').addEventListener('input',function(){setYear(parseInt(this.value));closeSheet();});

const pE=document.getElementById('pills');
PER.forEach(p=>{
  const el=document.createElement('div');el.className='pl';el.dataset.pid=p.id;
  el.innerHTML=`<div class="pd" style="background:${p.c}"></div>${p.name}`;
  el.onclick=()=>jumpTo(Math.round((p.s+p.e)/2));
  pE.appendChild(el);
});
setYear(-2800);
